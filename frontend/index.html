<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta tags -->
    <title>VerifyHire — Find Real Jobs, Avoid the Scam</title>
    <meta
      name="description"
      content="VerifyHire helps you check if an employer is verified, read reviews from other applicants, and report suspicious job postings — all in one place."
    />
    <link rel="canonical" href="https://verifyhire.com/" />

    <!-- Open Graph / Social -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://verifyhire.com/" />
    <meta property="og:title" content="VerifyHire — Find Real Jobs, Avoid the Scam" />
    <meta
      property="og:description"
      content="VerifyHire helps you check if an employer is verified, read reviews from other applicants, and report suspicious job postings."
    />
    <meta property="og:image" content="/og-image.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VerifyHire — Find Real Jobs, Avoid the Scam" />
    <meta
      name="twitter:description"
      content="VerifyHire helps you check if an employer is verified, read reviews from other applicants, and report suspicious job postings."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Fonts (preconnect + swap for best performance) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="bg-gray-50">
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
